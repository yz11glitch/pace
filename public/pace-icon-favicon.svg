<?xml version="1.0" encoding="UTF-8"?>
<!--
  Pace — Favicon-weight icon (32×32 render target)
  P only, no dots. Heavier stroke for clarity at tiny size.
  Use this source for favicon-32.png and favicon-16.png exports.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" gradientUnits="userSpaceOnUse" x1="163" y1="0" x2="349" y2="512">
      <stop offset="0%" stop-color="#FFFDFA"/>
      <stop offset="100%" stop-color="#F4EADF"/>
    </linearGradient>
    <clipPath id="squircle-clip">
      <rect width="512" height="512" rx="118" ry="118"/>
    </clipPath>
  </defs>

  <rect width="512" height="512" rx="118" ry="118" fill="url(#bg)"/>

  <!-- P only, centered, heavier weight for favicon clarity -->
  <!-- Shifted down slightly to visually center within the tile without dots -->
  <g transform="translate(92.16 92.16) scale(3.2768)">
    <path d="M30 24 V76"
          fill="none" stroke="#C2683E" stroke-width="14"
          stroke-linecap="round"/>
    <path d="M30 24 H50 A20 20 0 0 1 50 64 H30"
          fill="none" stroke="#C2683E" stroke-width="14"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <rect width="512" height="512" rx="118" ry="118"
        fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="5"
        clip-path="url(#squircle-clip)"/>
</svg>
